name: Build and Deploy APK to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          
      - name: Install dependencies
        run: npm install
        
      - name: Capacitor Sync
        run: |
          mkdir -p www
          cp -r src icons index.html manifest.json sw.js www/
          npx cap sync android
          
      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
          
      - name: Prepare Deployment Folder
        run: |
          mkdir -p dist
          cp -r www/* dist/
          cp android/app/build/outputs/apk/debug/app-debug.apk dist/IronLog.apk
          
          # Extract version from src/version.js and write to version.json
          # Looking for: export const APP_VERSION = '1.0.0';
          VERSION=$(grep -oP "APP_VERSION\s*=\s*['\"]\K[^'\"]+" src/version.js)
          echo "{\"version\": \"$VERSION\", \"apk_url\": \"IronLog.apk\"}" > dist/version.json
          
      - name: Setup Pages
        uses: actions/configure-pages@v4
        with:
          enablement: true
          
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'dist'
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
