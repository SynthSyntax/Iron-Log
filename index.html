<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="description" content="Track your gym workouts, exercises, sets, reps and weights. Free workout tracker.">
  <title>Iron Log — Gym Tracker</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#07070d">
  <meta name="mobile-web-app-capable" content="yes">

  <!-- Apple PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Iron Log">
  <link rel="apple-touch-icon" href="icons/icon-192.png">

  <!-- Fonts & Styles -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="src/style.css">
</head>
<body>
  <div id="app">
    <main id="view-container"></main>
  </div>

  <nav id="bottom-nav">
    <a href="#home" class="nav-item active" data-view="home" id="nav-home">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>Home</span>
    </a>
    <a href="#history" class="nav-item" data-view="history" id="nav-history">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      <span>History</span>
    </a>
    <div class="nav-fab-wrapper">
      <button id="start-workout-fab" aria-label="Start Workout">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
    </div>
    <a href="#exercises" class="nav-item" data-view="exercises" id="nav-exercises">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
      <span>Exercises</span>
    </a>
    <a href="#settings" class="nav-item" data-view="settings" id="nav-settings">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      <span>Settings</span>
    </a>
  </nav>

  <!-- Modals container -->
  <div id="modal-container"></div>

  <!-- Rest Timer Overlay -->
  <div id="rest-timer-overlay" class="hidden">
    <div class="rest-timer-content">
      <div class="rest-timer-ring">
        <svg viewBox="0 0 120 120">
          <circle cx="60" cy="60" r="54" fill="none" stroke="var(--surface-2)" stroke-width="6"/>
          <circle id="timer-progress" cx="60" cy="60" r="54" fill="none" stroke="var(--accent)" stroke-width="6" stroke-linecap="round" transform="rotate(-90 60 60)" stroke-dasharray="339.29" stroke-dashoffset="0"/>
        </svg>
        <div class="rest-timer-display">
          <span id="timer-value">1:30</span>
          <span class="timer-label">Rest</span>
        </div>
      </div>
      <div class="rest-timer-controls">
        <button class="timer-btn" id="timer-minus">−15s</button>
        <button class="timer-btn timer-skip" id="timer-skip">Skip</button>
        <button class="timer-btn" id="timer-plus">+15s</button>
      </div>
    </div>
  </div>

  <!-- Install Banner -->
  <div id="install-banner" class="install-banner hidden">
    <div class="install-banner-content">
      <img src="icons/icon-192.png" alt="Iron Log" width="40" height="40" style="border-radius: 10px;">
      <div class="install-banner-text">
        <strong>Install Iron Log</strong>
        <span>Add to your home screen for quick access</span>
      </div>
      <button class="btn btn-primary btn-sm" id="install-btn">Install</button>
      <button class="btn btn-ghost btn-sm" id="install-dismiss" style="padding: 6px;">✕</button>
    </div>
  </div>

  <script type="module" src="src/main.js"></script>

  <script>
    // Service Worker Registration
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then((reg) => console.log('SW registered:', reg.scope))
          .catch((err) => console.log('SW registration failed:', err));
      });
    }

    // Install Prompt (A2HS)
    let deferredPrompt = null;
    const installBanner = document.getElementById('install-banner');

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;

      // Show banner after short delay
      setTimeout(() => {
        if (installBanner) installBanner.classList.remove('hidden');
      }, 3000);
    });

    document.getElementById('install-btn')?.addEventListener('click', async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      deferredPrompt = null;
      if (installBanner) installBanner.classList.add('hidden');
    });

    document.getElementById('install-dismiss')?.addEventListener('click', () => {
      if (installBanner) installBanner.classList.add('hidden');
    });

    window.addEventListener('appinstalled', () => {
      if (installBanner) installBanner.classList.add('hidden');
      deferredPrompt = null;
    });
  </script>
</body>
</html>
